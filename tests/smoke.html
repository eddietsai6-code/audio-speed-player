<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Audio Speed Player Smoke</title>
    <script type="module">
      import "../dist/audio-speed-player.js";

      const result = document.getElementById("result");

      try {
        await customElements.whenDefined("audio-speed-player");
        const host = document.getElementById("nativePlayer");
        const professionalHost = document.getElementById("professionalPlayer");
        const shadow = host && host.shadowRoot;
        const professionalShadow = professionalHost && professionalHost.shadowRoot;

        if (!shadow || !professionalShadow) {
          result.textContent = JSON.stringify({ ok: false, reason: "missing shadow root" });
        } else {
          const slider = shadow.querySelector(".rate-input");
          const readout = shadow.querySelector(".rate-readout");
          const audio = shadow.querySelector("audio");
          const before = readout.textContent;

          slider.value = "1.25";
          slider.dispatchEvent(new Event("input", { bubbles: true }));

          const designChecks = {
            hasMetaballsStage: Boolean(shadow.querySelector(".metaballs-stage")),
            hasVisualizerCanvas: Boolean(shadow.querySelector(".visualizer-canvas")),
            hasEnergyMeter: Boolean(shadow.querySelector(".energy-meter")),
            hasControlDeck: Boolean(shadow.querySelector(".control-deck")),
            hasMeterTrack: Boolean(shadow.querySelector(".meter-track")),
            hasEngineStatus: Boolean(shadow.querySelector(".engine-status")),
            hasEngineStatusPart:
              shadow.querySelector(".engine-status")?.getAttribute("part") === "engine-status",
            hasSingleEngineStatus: shadow.querySelectorAll(".engine-status").length === 1,
            professionalHasSingleEngineStatus: professionalShadow.querySelectorAll(".engine-status").length === 1,
            nativeStatusVisible: shadow.querySelector(".engine-status")?.textContent.trim() === "Native engine",
            professionalFallbackVisible:
              professionalShadow.querySelector(".engine-status")?.textContent.trim() ===
              "Professional engine unavailable, using native engine",
            noCassetteShell: !shadow.querySelector(".cassette-shell"),
            noReels: shadow.querySelectorAll(".reel").length === 0
          };

          result.textContent = JSON.stringify({
            ok: Object.values(designChecks).every(Boolean),
            defined: Boolean(customElements.get("audio-speed-player")),
            title: shadow.querySelector(".title").textContent,
            before,
            after: readout.textContent,
            audioRate: audio.playbackRate,
            engineStatus: shadow.querySelector(".engine-status")?.textContent,
            professionalEngineStatus: professionalShadow.querySelector(".engine-status")?.textContent,
            ...designChecks,
            hasCassetteShell: Boolean(shadow.querySelector(".cassette-shell")),
            reelCount: shadow.querySelectorAll(".reel").length,
            hasTapeWindow: Boolean(shadow.querySelector(".tape-window")),
            presetCount: shadow.querySelectorAll("[data-rate]").length,
            hasUpload: Boolean(shadow.querySelector(".file-input")),
            hasAudioControls: audio.hasAttribute("controls")
          });
        }
      } catch (error) {
        result.textContent = JSON.stringify({ ok: false, reason: error.message });
      }
    </script>
  </head>
  <body>
    <audio-speed-player id="nativePlayer" label="Smoke pad"></audio-speed-player>
    <audio-speed-player id="professionalPlayer" label="Pro smoke pad" engine="rubberband"></audio-speed-player>
    <pre id="result">pending</pre>
  </body>
</html>
