<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Audio Speed Player Pro WASM Smoke</title>

      import { loadRubberBandWasm } from "../src/pro/rubberband-engine.js";

      const result = document.getElementById("result");

      try {
        await loadRubberBandWasm("");
        result.textContent = JSON.stringify({
          ok: false,
          reason: "missing wasm URL unexpectedly loaded"

  </head>
