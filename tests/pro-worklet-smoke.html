<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Audio Speed Player Pro Worklet Smoke</title>
    <script type="module">
      const result = document.getElementById("result");

      try {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) {
          throw new Error("AudioContext unavailable");
        }

        const context = new OfflineAudioContext(1, 128, 44100);
        await context.audioWorklet.addModule("../dist/audio-speed-player-pro.worklet.js");
        const node = new AudioWorkletNode(context, "audio-speed-player-rubberband");
        node.connect(context.destination);

        const waitForMessage = (type) =>
          new Promise((resolve, reject) => {
            const timer = setTimeout(() => {
              node.port.removeEventListener("message", handleMessage);
              reject(new Error(`Timed out waiting for ${type}`));
            }, 1000);

            function handleMessage(event) {
              if (event.data?.type !== type) return;
              clearTimeout(timer);
              node.port.removeEventListener("message", handleMessage);
              resolve(event.data);
            }

            node.port.addEventListener("message", handleMessage);
            node.port.start?.();
          });

        const loaded = waitForMessage("buffer-loaded");
        node.port.postMessage({
          type: "load-buffer",
          channelData: [Float32Array.from({ length: 128 }, (_, index) => index / 128)],
          sampleRate: 44100
        });
        const loadMessage = await loaded;

        const playing = waitForMessage("playing");
        node.port.postMessage({ type: "play" });
        await playing;

        const rendered = await context.startRendering();
        const output = rendered.getChannelData(0);
        const renderedNonZero = output.some((sample) => Math.abs(sample) > 0.0001);

        result.textContent = JSON.stringify({
          ok: renderedNonZero,
          workletLoaded: true,
          loadedFrames: loadMessage.frames,
          renderedNonZero
        });
      } catch (error) {
        result.textContent = JSON.stringify({
          ok: false,
          workletLoaded: false,
          reason: error.message
        });
      }
    </script>
  </head>
  <body>
    <pre id="result">pending</pre>
  </body>
</html>
